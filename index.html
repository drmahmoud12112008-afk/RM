<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RM | الواجهة الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- إضافة Font Awesome للأيقونات الحقيقية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- استيراد Firebase بشكل صحيح مع الإصدار الأحدث -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js"
            }
        }
    </script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent-glow: #00f2fe;
            --neon: #00f2fe;
            --text-glow: 0 0 15px rgba(0, 242, 254, 0.7);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg-gradient); color: white; }
        
        .browser-frame { width: 100vw; height: 100vh; display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); }
        .top-bar { padding: 15px 40px; display: flex; align-items: center; gap: 20px; background: rgba(0, 0, 0, 0.4); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .logo-control { font-weight: 900; font-size: 24px; color: var(--accent-glow); text-shadow: var(--text-glow); cursor: pointer; }
        .address-field { flex: 1; background: rgba(255, 255, 255, 0.05); padding: 8px 25px; border-radius: 50px; font-size: 14px; color: rgba(255, 255, 255, 0.5); direction: ltr; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .profile-container { cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .profile-image { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent-glow); box-shadow: var(--text-glow); transition: 0.3s; object-fit: cover; }
        .profile-image:hover { transform: scale(1.1); }
        .profile-name { color: white; font-weight: 600; display: none; }
        @media (min-width: 768px) { .profile-name { display: inline; } }

        .auth-btn { background: transparent; border: 1px solid var(--accent-glow); color: var(--accent-glow); padding: 8px 20px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .auth-btn:hover { background: var(--accent-glow); color: #000; box-shadow: var(--text-glow); }

        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .main-logo { font-size: clamp(80px, 12vw, 150px); font-weight: 900; color: #fff; text-shadow: 0 0 30px rgba(255, 255, 255, 0.3); margin-bottom: 30px; letter-spacing: 15px; animation: glowPulse 4s ease-in-out infinite; }
        @keyframes glowPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); text-shadow: 0 0 50px var(--accent-glow); } }
        
        .search-box { display: flex; background: rgba(255, 255, 255, 0.95); padding: 10px; border-radius: 100px; width: 100%; max-width: 600px; }
        .search-box input { flex: 1; border: none; outline: none; padding: 10px 20px; font-size: 16px; background: transparent; color: #000; }
        .search-box input::placeholder { color: #666; }
        .search-btn { background: linear-gradient(45deg, #00c6ff, #0072ff); border: none; padding: 0 25px; border-radius: 100px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .search-btn:hover { opacity: 0.9; transform: scale(1.05); }

        /* ===== شريط التواصل مع العملاء - في الأسفل ===== */
        .contact-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-top: 2px solid var(--accent-glow);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            z-index: 1000;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
        }

        .contact-text {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-left: 20px;
            background: rgba(0, 242, 254, 0.15);
            padding: 8px 25px;
            border-radius: 50px;
            border: 1px solid var(--accent-glow);
            letter-spacing: 1px;
        }

        .contact-icons {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .contact-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            font-size: 28px;
            color: white;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .contact-icon:hover {
            transform: translateY(-8px) scale(1.05);
            filter: brightness(1.2);
            box-shadow: 0 10px 25px currentColor;
        }

        /* أيقونات حقيقية لكل منصة */
        .icon-whatsapp {
            background: #25D366;
            color: white;
        }
        .icon-whatsapp i {
            font-size: 32px;
        }

        .icon-email {
            background: #EA4335;
            color: white;
        }
        .icon-email i {
            font-size: 28px;
        }

        .icon-facebook {
            background: #1877F2;
            color: white;
        }
        .icon-facebook i {
            font-size: 32px;
        }

        /* تلميحات الأيقونات */
        .contact-icon {
            position: relative;
        }

        .contact-icon::after {
            content: attr(title);
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            border: 1px solid var(--accent-glow);
            font-family: 'Cairo', sans-serif;
            font-weight: 500;
        }

        .contact-icon:hover::after {
            opacity: 1;
            top: -55px;
        }

        /* شاشة الأنيميشن */
        #loadingScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050510; z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
        }
        .neon-circle {
            width: 150px; height: 150px; border-radius: 50%; border: 2px solid transparent;
            border-top-color: var(--neon); border-bottom-color: var(--neon);
            animation: rotate 2s linear infinite; position: relative;
        }
        .neon-circle::after {
            content: ""; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border-radius: 50%; border: 2px solid transparent;
            border-left-color: #ff00ff; border-right-color: #ff00ff;
            animation: rotate-reverse 1.5s linear infinite;
        }
        @keyframes rotate { to { transform: rotate(360deg); } }
        @keyframes rotate-reverse { to { transform: rotate(-360deg); } }

        .progress-bar-container { width: 300px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 30px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon), #ff00ff); }
        .animate-progress { animation: fillProgress 3s forwards; }
        @keyframes fillProgress { to { width: 100%; } }

        .bg-grid {
            position: absolute; width: 200%; height: 200%; top: -50%;
            background-image: linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 10s linear infinite; z-index: -1;
        }
        @keyframes moveGrid { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(50px); } }

        /* مودال تسجيل الدخول */
        #authModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000;
            align-items: center; justify-content: center;
        }
        .modal-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 40px; width: 90%; max-width: 400px;
        }
        .modal-card h2 { color: var(--accent-glow); text-align: center; margin-bottom: 30px; }
        .modal-card input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3);
            color: white; font-size: 16px; outline: none;
        }
        .modal-card input:focus { border-color: var(--accent-glow); }
        .modal-card button {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px;
            border: none; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-login { background: var(--accent-glow); color: #000; }
        .btn-login:hover { box-shadow: var(--text-glow); transform: translateY(-2px); }
        .btn-google { background: white; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google:hover { background: #f0f0f0; transform: translateY(-2px); }
        .btn-close {
            background: transparent; border: 1px solid rgba(255,255,255,0.1) !important;
            color: white; margin-top: 5px;
        }
        .divider { text-align: center; margin: 20px 0; position: relative; }
        .divider::before, .divider::after {
            content: ""; position: absolute; top: 50%; width: 45%; height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider::before { right: 0; }
        .divider::after { left: 0; }
        .divider span { background: transparent; padding: 0 10px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div class="browser-frame" id="mainUI">
        <div class="top-bar">
            <div class="logo-control">RM</div>
            <div class="address-field">https://RM.system</div>
            <div id="authContainer">
                <!-- سيتم تعبئته ديناميكياً -->
            </div>
        </div>

        <div class="content">
            <h1 class="main-logo">RM</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث في RM..." value="">
                <button class="search-btn" onclick="handleSearch()">بحث</button>
            </div>
            <p style="margin-top: 30px; color: rgba(255,255,255,0.3);">نظام RM المتكامل v2.0</p>
        </div>
    </div>

    <!-- ===== شريط التواصل مع العملاء (في الأسفل) بأيقونات حقيقية ===== -->
    <div class="contact-bar">
        <div class="contact-text">📞 تواصل مع عملائنا</div>
        <div class="contact-icons">
            <!-- واتساب - أيقونة حقيقية -->
            <a href="https://wa.me/201118521703" target="_blank" class="contact-icon icon-whatsapp" title="واتساب">
                <i class="fab fa-whatsapp"></i>
            </a>
            
            <!-- البريد الإلكتروني - أيقونة حقيقية -->
            <a href="mailto:drmahmoud12112008@gmail.com" class="contact-icon icon-email" title="البريد الإلكتروني">
                <i class="fas fa-envelope"></i>
            </a>
            
            <!-- فيسبوك - أيقونة حقيقية -->
            <a href="https://www.facebook.com/profile.php?id=61588577554317&mibextid=ZbWKwL" target="_blank" class="contact-icon icon-facebook" title="فيسبوك">
                <i class="fab fa-facebook-f"></i>
            </a>
        </div>
    </div>

    <!-- شاشة الأنيميشن -->
    <div id="loadingScreen">
        <div class="bg-grid"></div>
        <div class="neon-circle"></div>
        <div id="loadingText" style="margin-top: 40px; font-weight: bold; letter-spacing: 2px;">جاري تأمين الاتصال...</div>
        <div class="progress-bar-container">
            <div id="progressFill" class="progress-fill"></div>
        </div>
    </div>

    <!-- مودال تسجيل الدخول -->
    <div id="authModal">
        <div class="modal-card">
            <h2>🔐 تسجيل الدخول إلى RM</h2>
            
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            
            <button class="btn-login" onclick="loginWithEmail()">تسجيل الدخول</button>
            
            <div class="divider"><span>أو</span></div>
            
            <button class="btn-google" onclick="loginWithGoogle()">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>تسجيل الدخول بـ Google</span>
            </button>
            
            <button class="btn-close" onclick="closeModal()">إلغاء</button>
        </div>
    </div>

    <script type="module">
        // استيراد Firebase
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, 
            signInWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged,
            signOut
        } from 'firebase/auth';

        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCOXoIfa4nkZg-DdJgF943Ru0sv5NIyQyA",
            authDomain: "dr-mahmoud-fb114.firebaseapp.com",
            projectId: "dr-mahmoud-fb114",
            storageBucket: "dr-mahmoud-fb114.firebasestorage.app",
            messagingSenderId: "832432121649",
            appId: "1:832432121649:web:93545f2089a85c347a7210"
        };

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // المتغيرات
        let currentUser = null;

        // ===========================================
        // دالة الحصول على الصورة المحفوظة
        // ===========================================
        function getSavedProfilePhoto() {
            if (currentUser) {
                const key = `profile_photo_${currentUser.uid}`;
                return localStorage.getItem(key);
            }
            return null;
        }

        // ===========================================
        // دوال المصادقة
        // ===========================================
        window.openModal = function() {
            document.getElementById('authModal').style.display = 'flex';
        }

        window.closeModal = function() {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        // تسجيل الدخول بالبريد الإلكتروني
        window.loginWithEmail = function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                alert('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }

            startLoading('', 'جاري تسجيل الدخول...');
            
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    closeModal();
                    updateUIForUser(userCredential.user);
                    stopLoading();
                })
                .catch((error) => {
                    stopLoading();
                    let message = 'خطأ في تسجيل الدخول: ';
                    switch(error.code) {
                        case 'auth/user-not-found':
                            message += 'البريد الإلكتروني غير مسجل';
                            break;
                        case 'auth/wrong-password':
                            message += 'كلمة المرور غير صحيحة';
                            break;
                        case 'auth/invalid-email':
                            message += 'البريد الإلكتروني غير صالح';
                            break;
                        default:
                            message += error.message;
                    }
                    alert(message);
                });
        }

        // تسجيل الدخول بجوجل
        window.loginWithGoogle = function() {
            startLoading('', 'جاري تسجيل الدخول بـ Google...');
            
            signInWithPopup(auth, googleProvider)
                .then((result) => {
                    closeModal();
                    updateUIForUser(result.user);
                    stopLoading();
                })
                .catch((error) => {
                    stopLoading();
                    alert('خطأ في تسجيل الدخول بـ Google: ' + error.message);
                });
        }

        // تسجيل الخروج
        window.logout = function() {
            if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                startLoading('', 'جاري تسجيل الخروج...');
                
                signOut(auth).then(() => {
                    currentUser = null;
                    updateUIForUser(null);
                    stopLoading();
                }).catch((error) => {
                    stopLoading();
                    alert('خطأ في تسجيل الخروج: ' + error.message);
                });
            }
        }

        // تحديث الواجهة حسب حالة المستخدم
        function updateUIForUser(user) {
            const authContainer = document.getElementById('authContainer');
            
            if (user) {
                currentUser = user;
                
                // التحقق من وجود صورة محفوظة في localStorage
                const savedPhoto = getSavedProfilePhoto();
                let photoURL;
                
                if (savedPhoto) {
                    // استخدام الصورة المحفوظة
                    photoURL = savedPhoto;
                } else if (user.photoURL) {
                    // استخدام صورة Firebase
                    photoURL = user.photoURL;
                } else {
                    // صورة افتراضية
                    photoURL = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'User')}&background=00f2fe&color=fff&size=128`;
                }
                
                const displayName = user.displayName || user.email || 'مستخدم';
                
                authContainer.innerHTML = `
                    <div class="profile-container" onclick="goToProfile()">
                        <span class="profile-name">${displayName}</span>
                        <img src="${photoURL}" class="profile-image" title="${displayName}">
                    </div>
                `;
            } else {
                authContainer.innerHTML = `
                    <button class="auth-btn" onclick="openModal()">تسجيل الدخول</button>
                `;
            }
        }

        // ===========================================
        // دوال البحث والتحميل
        // ===========================================
        window.handleSearch = function() {
            const query = document.getElementById('searchInput').value.trim();
            const specialCode = "8521703136784";

            if (query === "") {
                alert('الرجاء إدخال نص للبحث');
                return;
            }

            if (query === specialCode) {
                startLoading('index3.html', 'جاري الدخول إلى النظام السري...');
            } else {
                const encodedQuery = encodeURIComponent(query);
                window.location.href = `index2.html?q=${encodedQuery}`;
            }
        }

        function startLoading(targetPage, loadingMessage) {
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('loadingScreen').style.display = 'flex';
            document.getElementById('progressFill').classList.add('animate-progress');
            document.getElementById('loadingText').innerText = loadingMessage || 'جاري التحميل...';

            if (targetPage) {
                setTimeout(() => {
                    window.location.href = targetPage;
                }, 3000);
            }
        }

        function stopLoading() {
            document.getElementById('mainUI').style.display = 'flex';
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('progressFill').classList.remove('animate-progress');
        }

        // الذهاب إلى الملف الشخصي (index4.html)
        window.goToProfile = function() {
            if (currentUser) {
                window.location.href = 'index4.html';
            } else {
                openModal();
            }
        }

        // ===========================================
        // أحداث ومستمعات
        // ===========================================
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleSearch();
            }
        });

        // مراقبة حالة المصادقة
        onAuthStateChanged(auth, (user) => {
            updateUIForUser(user);
            if (user) {
                console.log('✅ مستخدم مسجل:', user.email);
            } else {
                console.log('❌ لا يوجد مستخدم مسجل');
            }
        });

        // إغلاق المودال عند الضغط خارج المحتوى
        window.onclick = function(event) {
            const modal = document.getElementById('authModal');
            if (event.target === modal) {
                closeModal();
            }
        };

        // حذف القيمة الافتراضية من حقل البحث
        window.onload = function() {
            document.getElementById('searchInput').value = "";
        };
    </script>
</body>
</html>
